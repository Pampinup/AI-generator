<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Generator</title>
    <link rel="stylesheet" href="src/style.css" />
  </head>
  <body>
    <div id="container">
    <header>
    <h1>📖 Story time AI Generator 🌙</h1>
    <p class="intro">Enter the topic and let the AI Generator create a story for you!</p>
</header>
<main>
  <form id="ai-form">
    <label for="prompt"></label>
    <input
      type="text"
      id="prompt"
      name="prompt"
      placeholder="Enter your topic here"
      autofocus
      required/>
      <button type="submit" id="submit-button">Story Time!</button>
      </form>
  <div class="result">
      <p id="loading"></p>
      
      </div>
</main>
    <footer>
        <p>This AI project was coded by 
        <a
            class="foot-link"
            href="https://github.com/Pampinup"
            target="_blank"
            >Joice Ortega</a
          > 
          and is open-sourced on 
          <a
            class="foot-link"
            href="https://github.com/Pampinup/AI-generator"
            target="_blank"
            >GitHub</a
            > and is hosted on 
            <a
            class="foot-link"
            href="https://ai-generattor.netlify.app/"
            target="_blank"
            >Netlify</a>
        </p>
        </footer>
        </div>
    <script src="src/index.js"></script>
  </body>
</html>
